version: '3.8'

services:
  # Streamlit dashboard
  streamlit:
    build: .
    ports:
      - "8501:8501"
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

  # FastAPI backend (optional)
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  data:
